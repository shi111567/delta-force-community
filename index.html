<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三角洲墨辰电竞 - 玩家社区</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">

<!--
=================== 数据库建表 SQL ====================

-- 用户资料表
CREATE TABLE profiles (
  id UUID PRIMARY KEY REFERENCES auth.users(id) ON DELETE CASCADE,
  username TEXT NOT NULL DEFAULT '干员_0000',
  avatar_url TEXT,
  level INT DEFAULT 1,
  exp INT DEFAULT 0,
  posts_count INT DEFAULT 0,
  likes_received INT DEFAULT 0,
  followers_count INT DEFAULT 0,
  following_count INT DEFAULT 0,
  is_admin BOOLEAN DEFAULT FALSE,
  admin_password TEXT,
  achievements TEXT[] DEFAULT '{}',
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 帖子表
CREATE TABLE posts (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  title TEXT NOT NULL,
  description TEXT,
  media_urls TEXT[] DEFAULT '{}',
  post_type TEXT DEFAULT 'normal' CHECK (post_type IN ('normal','vote','qa','story')),
  operator_class TEXT CHECK (operator_class IN ('突击','工程','侦察','支援','全能')),
  tags TEXT[] DEFAULT '{}',
  vote_options JSONB DEFAULT '[]',
  story_expires_at TIMESTAMPTZ,
  upvotes INT DEFAULT 0,
  downvotes INT DEFAULT 0,
  downloads INT DEFAULT 0,
  favorites_count INT DEFAULT 0,
  comments_count INT DEFAULT 0,
  hot_score NUMERIC DEFAULT 0,
  is_top_today BOOLEAN DEFAULT FALSE,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 投票表
CREATE TABLE votes (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,
  vote_type TEXT CHECK (vote_type IN ('up','down')) NOT NULL,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(user_id, post_id)
);

-- 收藏表
CREATE TABLE favorites (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(user_id, post_id)
);

-- 评论表
CREATE TABLE comments (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,
  parent_id UUID REFERENCES comments(id) ON DELETE CASCADE,
  content TEXT,
  voice_url TEXT,
  mentions TEXT[] DEFAULT '{}',
  upvotes INT DEFAULT 0,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 轮播图表
CREATE TABLE banners (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  image_url TEXT NOT NULL,
  link TEXT,
  active BOOLEAN DEFAULT TRUE,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 关注表
CREATE TABLE follows (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  follower_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  followed_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(follower_id, followed_id)
);

-- 签到表
CREATE TABLE checkins (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  checkin_date DATE DEFAULT CURRENT_DATE NOT NULL,
  streak INT DEFAULT 1,
  UNIQUE(user_id, checkin_date)
);

-- 精灵表
CREATE TABLE spirits (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  owner_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  co_parent_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  stage TEXT DEFAULT '幼年' CHECK (stage IN ('幼年','成长','成熟')),
  growth INT DEFAULT 0,
  last_interaction TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(owner_id)
);

-- 举报表
CREATE TABLE reports (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  reporter_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,
  reason TEXT NOT NULL,
  status TEXT DEFAULT 'pending' CHECK (status IN ('pending','resolved','dismissed')),
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- RLS 策略示例
ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public read profiles" ON profiles FOR SELECT USING (true);
CREATE POLICY "Users update own profile" ON profiles FOR UPDATE USING (auth.uid() = id);

ALTER TABLE posts ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public read posts" ON posts FOR SELECT USING (true);
CREATE POLICY "Authenticated insert posts" ON posts FOR INSERT WITH CHECK (auth.uid() = user_id);
CREATE POLICY "Users update own posts" ON posts FOR UPDATE USING (auth.uid() = user_id);

ALTER TABLE votes ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users vote once" ON votes FOR INSERT WITH CHECK (auth.uid() = user_id);

ALTER TABLE favorites ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users manage own favorites" ON favorites FOR ALL USING (auth.uid() = user_id);

ALTER TABLE comments ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public read comments" ON comments FOR SELECT USING (true);
CREATE POLICY "Users insert comments" ON comments FOR INSERT WITH CHECK (auth.uid() = user_id);

ALTER TABLE banners ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public read banners" ON banners FOR SELECT USING (true);

ALTER TABLE follows ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users manage follows" ON follows FOR ALL USING (auth.uid() = follower_id);

ALTER TABLE checkins ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users checkin self" ON checkins FOR INSERT WITH CHECK (auth.uid() = user_id);

ALTER TABLE spirits ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users manage own spirit" ON spirits FOR ALL USING (auth.uid() = owner_id);

ALTER TABLE reports ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users submit reports" ON reports FOR INSERT WITH CHECK (auth.uid() = reporter_id);

-- 存储桶
INSERT INTO storage.buckets (id, name, public) VALUES ('posts', 'posts', true);
INSERT INTO storage.buckets (id, name, public) VALUES ('voices', 'voices', true);

CREATE POLICY "Public read posts bucket" ON storage.objects FOR SELECT USING (bucket_id = 'posts');
CREATE POLICY "Authenticated upload posts" ON storage.objects FOR INSERT WITH CHECK (bucket_id = 'posts' AND auth.role() = 'authenticated');

CREATE POLICY "Public read voices bucket" ON storage.objects FOR SELECT USING (bucket_id = 'voices');
CREATE POLICY "Authenticated upload voices" ON storage.objects FOR INSERT WITH CHECK (bucket_id = 'voices' AND auth.role() = 'authenticated');

=================== 建表 SQL 结束 ====================
-->

<script>
tailwind.config = {
  darkMode: ['selector', '[data-theme="dark"]'],
  theme: {
    extend: {
      colors: {
        warm: { 50:'#FFF8F0', 100:'#FFEFD5', 200:'#FFD699', 300:'#FFB347', 400:'#FF9A3C', 500:'#FF6B35', 600:'#E85D2C', 700:'#C44D23', 800:'#8B3A1A', 900:'#5C2711' },
        dream: { pink:'#FF6B8A', coral:'#FF4757', gold:'#FFD700', peach:'#FFAB91', rose:'#FF8A80' },
        dark: { bg:'#0F0906', card:'#1C120D', surface:'#2A1A12', text:'#F5E6D3', muted:'#A0897A' }
      },
      fontFamily: {
        display: ['ZCOOL QingKe HuangYou', 'sans-serif'],
        body: ['Noto Sans SC', 'sans-serif']
      }
    }
  }
}
</script>

<style>
  :root {
    --bg: #FFF5E8; --card: rgba(255,240,220,0.85); --surface: #FFEFD5;
    --text: #3D2B1F; --muted: #8B7355; --accent: #FF6B35;
    --accent2: #FF4757; --gold: #FFD700; --border: rgba(255,107,53,0.2);
    --glow: rgba(255,107,53,0.3); --shadow: rgba(60,30,10,0.1);
  }
  [data-theme="dark"] {
    --bg: #0F0906; --card: rgba(28,18,13,0.9); --surface: #2A1A12;
    --text: #F5E6D3; --muted: #A0897A; --accent: #FF8C5A;
    --accent2: #FF6B8A; --gold: #FFD700; --border: rgba(255,140,90,0.15);
    --glow: rgba(255,140,90,0.2); --shadow: rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans SC', sans-serif; background: var(--bg);
    color: var(--text); transition: background 0.4s, color 0.4s;
    min-height: 100vh; overflow-x: hidden;
  }
  #particle-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

  /* 自定义滚动条 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  /* 卡片基础样式 */
  .card-base {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; backdrop-filter: blur(12px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .card-base:hover { transform: scale(1.03); box-shadow: 0 8px 40px var(--glow); }

  /* 按钮动画 */
  .btn-warm {
    background: linear-gradient(135deg, #FF6B35, #FF4757);
    color: #fff; border: none; border-radius: 12px; padding: 8px 20px;
    font-weight: 700; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 2px 10px rgba(255,107,53,0.3);
  }
  .btn-warm:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(255,107,53,0.5); }
  .btn-warm:active { transform: scale(0.95); }

  .btn-ghost {
    background: transparent; border: 1.5px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 8px 18px; cursor: pointer; transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,107,53,0.05); }

  /* 弹窗动画 */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-content {
    background: var(--card); border-radius: 20px; padding: 28px;
    max-width: 600px; width: 92%; max-height: 85vh; overflow-y: auto;
    transform: scale(0.7); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    border: 1px solid var(--border); box-shadow: 0 20px 60px var(--shadow);
  }
  .modal-overlay.active .modal-content { transform: scale(1); }

  /* Toast */
  .toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; }
  .toast {
    background: linear-gradient(135deg, #FF6B35, #FF4757); color: #fff;
    padding: 12px 24px; border-radius: 12px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
    animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1), toastOut 0.3s 2.7s forwards;
  }
  @keyframes toastIn { from { transform: translateY(40px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  @keyframes toastOut { to { transform: translateY(40px); opacity:0; } }

  /* 卡片入场动画 */
  .card-enter { opacity: 0; transform: translateY(30px); animation: cardSlideIn 0.5s forwards; }
  @keyframes cardSlideIn { to { opacity:1; transform: translateY(0); } }

  /* 进度条 */
  .exp-bar { height: 8px; border-radius: 4px; background: var(--surface); overflow: hidden; }
  .exp-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #FF6B35, #FFD700); transition: width 0.6s; }

  /* 筛选按钮 */
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all 0.25s; font-size: 13px; font-weight: 500;
  }
  .filter-btn.active, .filter-btn:hover {
    background: linear-gradient(135deg, #FF6B35, #FF4757);
    color: #fff; border-color: transparent;
    box-shadow: 0 2px 12px rgba(255,107,53,0.3);
  }

  /* 瀑布流 */
  .masonry { column-count: 3; column-gap: 16px; }
  @media (max-width: 1024px) { .masonry { column-count: 2; } }
  @media (max-width: 640px) { .masonry { column-count: 1; } }
  .masonry-item { break-inside: avoid; margin-bottom: 16px; }

  /* Story 环 */
  .story-ring {
    background: linear-gradient(135deg, #FF6B35, #FFD700, #FF4757);
    padding: 3px; border-radius: 50%; display: inline-block;
  }
  .story-ring img { border-radius: 50%; border: 3px solid var(--bg); }

  /* BGM 播放器 */
  .bgm-player {
    position: fixed; bottom: 16px; left: 16px; z-index: 900;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px var(--shadow); padding: 10px 14px;
    transition: all 0.3s; max-width: 320px;
  }
  .bgm-player.minimized { width: 48px; height: 48px; padding: 0; border-radius: 50%; overflow: hidden; cursor: pointer; }

  /* 悬浮按钮 */
  .scroll-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 900;
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #FF6B35, #FF4757);
    color: #fff; border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
    transition: all 0.3s; display: flex; align-items: center; justify-content: center;
  }
  .scroll-btn:hover { transform: scale(1.15); box-shadow: 0 6px 30px rgba(255,107,53,0.6); }

  /* 移动端底部导航 */
  .mobile-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    backdrop-filter: blur(12px); z-index: 800; padding: 8px 0;
  }
  @media (max-width: 768px) { .mobile-nav { display: flex; } }

  /* 通知红点 */
  .notif-dot {
    width: 8px; height: 8px; background: #FF4757; border-radius: 50%;
    position: absolute; top: -2px; right: -2px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

  /* 精灵动画 */
  .spirit-flame {
    width: 40px; height: 50px; position: relative;
    animation: flameFloat 2s ease-in-out infinite;
  }
  @keyframes flameFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .spirit-flame.gray { filter: grayscale(1) brightness(0.5); }

  /* 顶部导航 */
  .top-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 800;
    background: var(--card); border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px); transition: all 0.3s;
  }

  /* 图片放大查看 */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
    display: none; align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 8px; }

  /* 投票选项 */
  .vote-option {
    position: relative; padding: 10px 16px; border: 1.5px solid var(--border);
    border-radius: 10px; cursor: pointer; overflow: hidden; transition: all 0.2s;
  }
  .vote-option:hover { border-color: var(--accent); }
  .vote-bar {
    position: absolute; left: 0; top: 0; height: 100%;
    background: linear-gradient(90deg, rgba(255,107,53,0.15), rgba(255,71,87,0.1));
    transition: width 0.5s; border-radius: 10px;
  }

  /* 勋章 */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .badge-gold { background: linear-gradient(135deg, #FFD700, #FFA500); color: #3D2B1F; }
  .badge-silver { background: linear-gradient(135deg, #C0C0C0, #808080); color: #fff; }
  .badge-bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); color: #fff; }

  /* 响应式调整 */
  @media (max-width: 768px) {
    .top-nav .desktop-only { display: none !important; }
    .bgm-player { bottom: 70px; left: 8px; max-width: 260px; }
    .scroll-btn { bottom: 80px; right: 16px; }
    body { padding-bottom: 70px; }
  }
  @media (min-width: 769px) {
    .mobile-nav { display: none !important; }
  }

  .tag-pill {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 11px; background: rgba(255,107,53,0.1); color: var(--accent);
    border: 1px solid rgba(255,107,53,0.2);
  }

  /* 录音动画 */
  .recording { animation: recordPulse 0.8s infinite; }
  @keyframes recordPulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* 排行榜 */
  .rank-item { transition: all 0.2s; }
  .rank-item:hover { transform: translateX(4px); }

  input, textarea, select {
    background: var(--surface); color: var(--text); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 14px; font-family: inherit; transition: border 0.2s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
</style>
</head>

<body>
<!-- Canvas 粒子背景 -->
<canvas id="particle-canvas"></canvas>

<!-- 顶部导航栏 -->
<nav class="top-nav" id="topNav">
  <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="font-display text-xl md:text-2xl" style="background:linear-gradient(135deg,#FF6B35,#FF4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">三角洲墨辰电竞</span>
    </div>
    <div class="hidden md:flex items-center gap-2">
      <button onclick="switchTab('home')" class="btn-ghost text-sm" id="navHome">首页</button>
      <button onclick="switchTab('discover')" class="btn-ghost text-sm" id="navDiscover">发现</button>
      <button onclick="switchTab('following')" class="btn-ghost text-sm" id="navFollowing">关注</button>
      <button onclick="openModal('publishModal')" class="btn-warm text-sm">发布</button>
    </div>
    <div class="flex items-center gap-3">
      <span id="bjTime" class="text-xs font-mono hidden sm:block" style="color:var(--muted)"></span>
      <button onclick="toggleTheme()" class="w-8 h-8 rounded-full flex items-center justify-center" style="background:var(--surface);border:1px solid var(--border)" id="themeBtn" aria-label="切换主题">☀️</button>
      <div class="relative">
        <button onclick="openModal('notifModal')" class="w-8 h-8 rounded-full flex items-center justify-center" style="background:var(--surface);border:1px solid var(--border)" aria-label="通知">
          <i class="fas fa-bell text-sm" style="color:var(--muted)"></i>
        </button>
        <div class="notif-dot" id="notifDot" style="display:none"></div>
      </div>
      <button onclick="openProfile()" class="w-8 h-8 rounded-full overflow-hidden" style="border:2px solid var(--accent)" id="navAvatar" aria-label="个人主页">
        <img src="" alt="头像" class="w-full h-full object-cover" id="navAvatarImg">
      </button>
    </div>
  </div>
</nav>

<!-- 主内容区 -->
<main class="relative z-10 pt-16 pb-20 max-w-7xl mx-auto px-4" id="mainContent">

<!-- 轮播图区域（已禁用）
<section id="bannerSection" class="mb-6 rounded-2xl overflow-hidden" style="display:none">
  <div class="relative" id="bannerContainer"></div>
</section>
-->

  <!-- Story 限时动态 -->
  <section class="mb-6">
    <div class="flex gap-4 overflow-x-auto py-2" id="storiesBar" style="scrollbar-width:none">
      <div class="flex flex-col items-center gap-1 cursor-pointer flex-shrink-0" onclick="openModal('storyPublishModal')">
        <div class="w-16 h-16 rounded-full flex items-center justify-center" style="border:2px dashed var(--accent)">
          <i class="fas fa-plus" style="color:var(--accent)"></i>
        </div>
        <span class="text-xs" style="color:var(--muted)">发布动态</span>
      </div>
    </div>
  </section>

  <!-- 首页 Tab -->
  <div id="homeTab">
    <!-- 筛选栏 -->
    <div class="flex flex-wrap gap-2 mb-4 items-center">
      <div class="flex flex-wrap gap-1.5">
        <button class="filter-btn active" data-filter="type" data-val="all" onclick="setFilter('type','all',this)">全部</button>
        <button class="filter-btn" data-filter="type" data-val="normal" onclick="setFilter('type','normal',this)">图文</button>
        <button class="filter-btn" data-filter="type" data-val="vote" onclick="setFilter('type','vote',this)">投票</button>
        <button class="filter-btn" data-filter="type" data-val="qa" onclick="setFilter('type','qa',this)">问答</button>
      </div>
      <div class="flex flex-wrap gap-1.5">
        <button class="filter-btn active" data-filter="op" data-val="all" onclick="setFilter('op','all',this)">全兵种</button>
        <button class="filter-btn" data-filter="op" data-val="突击" onclick="setFilter('op','突击',this)">突击</button>
        <button class="filter-btn" data-filter="op" data-val="工程" onclick="setFilter('op','工程',this)">工程</button>
        <button class="filter-btn" data-filter="op" data-val="侦察" onclick="setFilter('op','侦察',this)">侦察</button>
        <button class="filter-btn" data-filter="op" data-val="支援" onclick="setFilter('op','支援',this)">支援</button>
      </div>
      <div class="flex gap-1.5 ml-auto">

function timeAgo(dateStr) {
  const d = new Date(dateStr), now = new Date(), diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  if (diff < 2592000) return Math.floor(diff/86400) + '天前';
  return d.toLocaleDateString('zh-CN');
}

// ==================== 粒子背景 ====================
(function initParticles() {
  const canvas = $('particle-canvas'), ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const COLORS = ['#FF6B35','#FFD700','#FF4757','#FFAB91','#FF6B8A','#FF8C5A'];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*3+1, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.3,
      color: COLORS[Math.floor(Math.random()*COLORS.length)], alpha: Math.random()*0.5+0.2
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fill();
      // 发光效果
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(1, p.r*3), 0, Math.PI*2);
      const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,Math.max(1,p.r*3));
      g.addColorStop(0, p.color); g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.globalAlpha = p.alpha*0.3; ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();

// ==================== 帖子加载与渲染 ====================
async function loadPosts(reset) {
  if (reset) { APP.postsPage = 0; APP.allPostsLoaded = false; $('postsGrid').innerHTML = ''; }
  if (APP.allPostsLoaded) return;

  let query = sb.from('posts').select('*, profiles(username, avatar_url, level)', { count: 'exact' })
    .neq('post_type', 'story');

  // 筛选
  if (APP.filters.type !== 'all') query = query.eq('post_type', APP.filters.type);
  if (APP.filters.op !== 'all') query = query.eq('operator_class', APP.filters.op);

  // 排序
  const sortMap = { latest: 'created_at', hot: 'hot_score', likes: 'upvotes', downloads: 'downloads' };
  query = query.order(sortMap[APP.filters.sort] || 'created_at', { ascending: false });

  const from = APP.postsPage * APP.postsPerPage;
  query = query.range(from, from + APP.postsPerPage - 1);

  const { data, error } = await query;
  if (error) { console.error('加载帖子失败:', error); return; }

  // 加载置顶帖
  await loadTopPost();

  // 渲染
  (data || []).forEach((p, i) => {
    const el = createPostCard(p, i);
    $('postsGrid').appendChild(el);
  });

  if ((data||[]).length < APP.postsPerPage) APP.allPostsLoaded = true;
  APP.postsPage++;

  // 加载用户投票信息
  await loadUserVotes();
}

async function publishPost() {
  const title = $('pubTitle').value.trim();
  if (!title) { showToast('请输入标题'); return; }

  showToast('发布中...');
  const mediaUrls = [];

  // 上传媒体文件
  const files = $('pubMedia').files;
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    const ext = f.name.split('.').pop();
const path = `${APP.user.id}/${Date.now()}_${Math.random().toString(36).substr(2, 6)}.${ext}`;
    const { error } = await sb.storage.from('posts').upload(path, f);
    if (!error) {
      const { data: { publicUrl } } = sb.storage.from('posts').getPublicUrl(path);
      mediaUrls.push(publicUrl);
    }
  }

  // 投票选项
  let voteOptions = [];
  if ($('pubType').value === 'vote') {
    qsa('.vote-opt-input').forEach(inp => {
      if (inp.value.trim()) voteOptions.push({ text: inp.value.trim(), votes: 0 });
    });
  }

  const tags = $('pubTags').value.split(/[,，]/).map(t => t.trim()).filter(Boolean);

  const postData = {
    user_id: APP.user.id, title, description: $('pubDesc').value.trim(),
    media_urls: mediaUrls, post_type: $('pubType').value,
    operator_class: $('pubOpClass').value || null,
    tags, vote_options: voteOptions
  };

  const { error } = await sb.from('posts').insert(postData);
  if (error) { showToast('发布失败: ' + error.message); return; }

  // 更新发帖计数
  await sb.from('profiles').update({ posts_count: (APP.profile.posts_count||0) + 1 }).eq('id', APP.user.id);
  APP.profile.posts_count = (APP.profile.posts_count||0) + 1;

  // 检查成就
  checkAchievement('first_post', APP.profile.posts_count >= 1);

  showToast('发布成功！');
  closeModal('publishModal');
  $('pubTitle').value = ''; $('pubDesc').value = ''; $('pubTags').value = '';
  $('pubMediaPreview').innerHTML = ''; $('pubMedia').value = '';
  loadPosts(true);
}

async function loadComments(pid) {
  const { data } = await sb.from('comments').select('*, profiles(username, avatar_url)').eq('post_id', pid).order('created_at', { ascending: true });
  const list = $('commentsList');
  list.innerHTML = '';
  if (!data || !data.length) { list.innerHTML = '<p class="text-center py-4" style="color:var(--muted)">暂无评论</p>'; return; }
  // 构建评论树
  const map = {}, roots = [];
  data.forEach(c => { c.children = []; map[c.id] = c; });
  data.forEach(c => { if (c.parent_id && map[c.parent_id]) map[c.parent_id].children.push(c); else roots.push(c); });
  function renderComment(c, depth=0) {
    const mentions = (c.mentions||[]).map(m => `@${m}`).join(' ') ;
    const voiceBtn = c.voice_url ? `<button class="text-xs px-2 py-1 rounded" style="background:var(--surface)" onclick="playVoiceComment('${c.voice_url}')"><i class="fas fa-play mr-1"></i>语音</button>` : '';
    let html = `
      <div class="p-2 rounded-lg" style="margin-left:${depth*20}px;background:var(--surface)">
        <div class="flex items-center gap-2 mb-1">
          <img src="${c.profiles?.avatar_url || dicebearUrl('c')}" class="w-6 h-6 rounded-full">
          <span class="text-xs font-bold">${c.profiles?.username || '干员'}</span>
          <span class="text-xs" style="color:var(--muted)">${timeAgo(c.created_at)}</span>
        </div>
        ${c.content ? `<p class="text-sm mb-1">${mentions ? `<span style="color:var(--accent)">${mentions}</span> ` : ''}${c.content}</p>` : ''}
        ${voiceBtn}
        <div class="flex gap-2 mt-1">
          <button class="text-xs" style="color:var(--muted)" onclick="likeComment('${c.id}')"><i class="fas fa-thumbs-up"></i> ${c.upvotes||0}</button>
          <button class="text-xs" style="color:var(--muted)" onclick="replyTo('${c.profiles?.username||''}','${c.id}')"><i class="fas fa-reply"></i> 回复</button>
        </div>
      </div>
    `;
    let result = html;
    (c.children||[]).forEach(ch => { result += renderComment(ch, depth+1); });
    return result;
  }
  roots.forEach(r => { list.innerHTML += renderComment(r); });
}

function replyTo(username, parentId) {
  const inp = $('commentInput');
  inp.value = `@${username} ` + inp.value;
  inp.dataset.parentId = parentId;
  inp.dataset.mention = username;
  inp.focus();
}

async function submitComment() {
  const content = $('commentInput').value.trim();
  const voiceUrl = $('commentInput').dataset.voiceUrl || null;
  if (!content && !voiceUrl) { showToast('请输入评论内容'); return; }

  const parentId = $('commentInput').dataset.parentId || null;
  const mentions = (content.match(/@(\S+)/g)||[]).map(m => m.substring(1));

  const { error } = await sb.from('comments').insert({
    user_id: APP.user.id, post_id: APP.currentPostId,
    parent_id: parentId, content, voice_url: voiceUrl, mentions
  });
  if (error) { showToast('评论失败'); return; }

// ==================== 语音评论录制 ====================
let mediaRecorder = null, audioChunks = [], voiceTimer = null, voiceSeconds = 0;

async function toggleVoiceRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopVoiceRecord(); return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      clearInterval(voiceTimer);
      $('voiceRecordingIndicator').style.display = 'none';
      $('voiceRecordBtn').style.color = '';
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      if (voiceSeconds < 1) return;
      const path = `${APP.user.id}/voice_${Date.now()}.webm`;
      const { error } = await sb.storage.from('voices').upload(path, blob);
      if (!error) {
        const { data: { publicUrl } } = sb.storage.from('voices').getPublicUrl(path);
        $('commentInput').dataset.voiceUrl = publicUrl;
        showToast('语音已录制，点击发送评论');
      }
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    voiceSeconds = 0;
    $('voiceRecordingIndicator').style.display = 'block';
    $('voiceRecordBtn').style.color = '#FF4757';
    voiceTimer = setInterval(() => {
      voiceSeconds++;
      $('voiceTimer').textContent = `${voiceSeconds}s / 15s`;
      if (voiceSeconds >= 15) stopVoiceRecord();
    }, 1000);
  } catch(e) { showToast('无法访问麦克风'); }
}

function stopVoiceRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
}

// ==================== 下载加水印 ====================
async function downloadWithWatermark(pid) {
  const { data: post } = await sb.from('posts').select('media_urls, downloads').eq('id', pid).single();
  if (!post || !post.media_urls || !post.media_urls.length) { showToast('无可下载内容'); return; }

  const url = post.media_urls[0];
  
  // 判断是否为管理员（从 APP.isAdmin 获取）
  const isAdmin = APP.isAdmin;
  
  if (url.match(/\.(mp4|webm)$/i)) {
    // 视频直接下载（无水印）
    const a = document.createElement('a'); 
    a.href = url; 
    a.download = 'video.mp4'; 
    a.click();
  } else {
    const img = new Image(); 
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; 
      c.height = img.naturalHeight;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      
      // 如果不是管理员，添加水印
      if (!isAdmin) {
        ctx.font = `${Math.max(16, c.width * 0.03)}px "Noto Sans SC"`;
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.textAlign = 'right';
        ctx.fillText('墨辰电竞', c.width - 20, c.height - 20);
      }
      
      const link = document.createElement('a');
      link.download = isAdmin ? 'mochen_admin.png' : 'mochen_download.png';
      link.href = c.toDataURL('image/png');
      link.click();
    };
    img.src = url;
  }
  // 更新下载计数
  await sb.from('posts').update({ downloads: (post.downloads||0)+1 }).eq('id', pid);
  showToast('下载成功');
}

async function castVote(optIdx, pid) {

async function checkIn() {
  const today = new Date().toISOString().split('T')[0];
  const { data: existing } = await sb.from('checkins').select('*').eq('user_id', APP.user.id).eq('checkin_date', today).single();
  if (existing) { showToast('今日已签到'); return; }

  // 获取昨天签到计算连续天数
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  const { data: yd } = await sb.from('checkins').select('streak').eq('user_id', APP.user.id).eq('checkin_date', yesterday).single();
  const streak = (yd?.streak || 0) + 1;
  const expGain = streak >= 7 ? 50 : 10;

  const { error } = await sb.from('checkins').insert({ user_id: APP.user.id, checkin_date: today, streak });
  if (error) { showToast('签到失败'); return; }

  // 更新经验
  const newExp = (APP.profile.exp || 0) + expGain;
  const levelUp = newExp >= (APP.profile.level || 1) * 100;
  const newLevel = levelUp ? (APP.profile.level || 1) + 1 : APP.profile.level;
  await sb.from('profiles').update({ exp: newExp, level: newLevel }).eq('id', APP.user.id);
  APP.profile.exp = newExp; APP.profile.level = newLevel;

  if (streak >= 7) checkAchievement('7_checkin', true);
  showToast(`签到成功！+${expGain}EXP ${streak >= 7 ? '（7日连签奖励！）' : ''}${levelUp ? ' 升级了！' : ''}`);
  renderProfile();
}

    APP.myFavSet.add(f.post_id);
    const p = f.posts;
    if (!p) return;
    const div = document.createElement('div');
    div.className = 'masonry-item';
    div.innerHTML = `<div class="card-base p-3"><h4 class="font-bold text-sm">${p.title}</h4><div class="text-xs mt-1" style="color:var(--muted)"><i class="fas fa-thumbs-up mr-1"></i>${p.upvotes||0} · <i class="fas fa-comment mr-1"></i>${p.comments_count||0}</div></div>`;
    grid.appendChild(div);
  });
}

// ==================== 管理员系统 ====================
async function adminLogin() {
  const pwd = $('adminPwd').value;
  const { data } = await sb.from('profiles').select('admin_password, is_admin').eq('id', APP.user.id).single();
  const correctPwd = data?.admin_password || 'mcdj2026';
  if (pwd === correctPwd) {
    APP.isAdmin = true;
    await sb.from('profiles').update({ is_admin: true }).eq('id', APP.user.id);
    $('adminLogin').style.display = 'none';
    $('adminPanel').style.display = 'block';
    loadAdminData();
    $('adminEntry').style.display = 'block';
    showToast('管理员验证成功');
  } else {
    showToast('密码错误');
  }
}

async function loadAdminData() {
  // 加载宣传图列表
  const { data: banners } = await sb.from('banners').select('*').order('created_at', { ascending: false });
  const list = $('adminBannerList');
  list.innerHTML = '';
  (banners||[]).forEach(b => {
    list.innerHTML += `<div class="flex items-center gap-2 p-2 rounded-lg" style="background:var(--surface)">
      <img src="${b.image_url}" class="w-12 h-12 object-cover rounded cursor-pointer" onclick="openLightbox('${b.image_url}')">
      <span class="text-xs flex-1">${b.link || '无链接'}</span>
      <button class="text-xs text-red-400" onclick="deleteBanner('${b.id}')"><i class="fas fa-trash"></i></button>
    </div>`;
  });

  // 加载举报列表
  const { data: reports } = await sb.from('reports').select('*, profiles(username), posts(title)').order('created_at', { ascending: false }).limit(20);
  const rEl = $('adminReports');
  rEl.innerHTML = '';
  (reports||[]).forEach(r => {
    rEl.innerHTML += `<div class="p-2 rounded-lg text-sm" style="background:var(--surface)">
      <div class="font-bold">${r.posts?.title || '已删除帖子'}</div>
      <div class="text-xs" style="color:var(--muted)">举报者：${r.profiles?.username || '未知'} · 原因：${r.reason}</div>
      <div class="flex gap-2 mt-1">
        <button class="text-xs text-green-400" onclick="resolveReport('${r.id}','resolved')">已处理</button>
        <button class="text-xs text-yellow-400" onclick="resolveReport('${r.id}','dismissed')">驳回</button>
      </div>
    </div>`;
  });
}

async function uploadBanner() {
  const file = $('adminBannerFile').files[0];
  if (!file) { showToast('请选择图片'); return; }
  const ext = file.name.split('.').pop();
const path = `banners/${Date.now()}_${Math.random().toString(36).substr(2, 6)}.${ext}`;
  const { error } = await sb.storage.from('posts').upload(path, file);
  if (error) { showToast('上传失败'); return; }
  const { data: { publicUrl } } = sb.storage.from('posts').getPublicUrl(path);
  const link = $('adminBannerLink').value.trim();
  await sb.from('banners').insert({ image_url: publicUrl, link: link || null, active: true });
  showToast('宣传图已上传');
  loadAdminData();
  loadBanners();
}

async function deleteBanner(bid) {
  await sb.from('banners').delete().eq('id', bid);
  showToast('已删除');
  loadAdminData();
  loadBanners();
}

async function changeAdminPwd() {
  const newPwd = $('newAdminPwd').value.trim();
  if (!newPwd) { showToast('请输入新密码'); return; }
  await sb.from('profiles').update({ admin_password: newPwd }).eq('id', APP.user.id);
  showToast('密码已修改');
  $('newAdminPwd').value = '';
}

async function resolveReport(rid, status) {
  await sb.from('reports').update({ status }).eq('id', rid);
  showToast('已处理');
  loadAdminData();
}

// ==================== 实时通知 ====================
function subscribeRealtime() {
  if (!sb) return;
  sb.channel('public:comments')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments' }, payload => {
      if (payload.new.user_id !== APP.user.id) {
        APP.notifications.push({ type: 'comment', msg: '有人评论了你的帖子', time: new Date() });
        $('notifDot').style.display = 'block';
        renderNotifications();
      }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'votes' }, payload => {
      if (payload.new.vote_type === 'up') {
        APP.notifications.push({ type: 'like', msg: '你的帖子收到了赞', time: new Date() });
        $('notifDot').style.display = 'block';
        renderNotifications();
      }
    })
    .subscribe();
}

function renderNotifications() {
  const list = $('notifList');
  if (!APP.notifications.length) {
    list.innerHTML = '<p class="text-center py-8" style="color:var(--muted)">暂无新通知</p>';
    return;
  }
  list.innerHTML = APP.notifications.slice(-20).reverse().map(n => `
    <div class="p-2 rounded-lg text-sm" style="background:var(--surface)">
      <i class="fas fa-${n.type==='like'?'thumbs-up text-orange-400':'comment text-blue-400'} mr-2"></i>${n.msg}
      <span class="text-xs ml-2" style="color:var(--muted)">${timeAgo(n.time)}</span>
    </div>
  `).join('');
}

// ==================== BGM 播放器 ====================
const BGM_SONGS = [
  { name:'三角洲行动 - 主旋律', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
  { name:'战场黄昏', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
  { name:'墨辰之歌', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' },
  { name:'烈焰冲锋', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3' },
  { name:'暗夜侦察', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3' },
  { name:'工程师进行曲', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3' },
  { name:'支援前线', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3' },
  { name:'突袭黎明', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3' },
  { name:'全面战争', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3' },
  { name:'胜利时刻', url:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3' }
];

const bgmState = { playing: false, idx: 0, audio: null, volume: 0.5, playlist: [...BGM_SONGS] };

function initBGM() {
  bgmState.audio = new Audio();
  bgmState.audio.volume = 0; // 静音开始
  bgmState.idx = Math.floor(Math.random() * bgmState.playlist.length);
  loadBGMTrack();

  // 点击页面恢复音量
  const unmute = () => {
    if (bgmState.audio && bgmState.audio.volume === 0) {
      bgmState.audio.volume = bgmState.volume;
      $('bgmVol').value = bgmState.volume * 100;
    }
    document.removeEventListener('click', unmute);
  };
  document.addEventListener('click', unmute);

  // 进度更新
  bgmState.audio.addEventListener('timeupdate', () => {
    if (bgmState.audio.duration) {
      const pct = (bgmState.audio.currentTime / bgmState.audio.duration) * 100;
      $('bgmProgress').style.width = pct + '%';
    }
  });

  bgmState.audio.addEventListener('ended', () => bgmNext());

  // 视频播放时暂停 BGM
  document.addEventListener('play', e => {
    if (e.target.tagName === 'VIDEO') { bgmState.audio.pause(); bgmState.playing = false; updateBGMBtn(); }
  }, true);
  document.addEventListener('pause', e => {
    if (e.target.tagName === 'VIDEO' && bgmState.playing === false) { bgmState.audio.play(); bgmState.playing = true; updateBGMBtn(); }
  }, true);

  renderBGMPlaylist();
}

function loadBGMTrack() {
  if (!bgmState.playlist.length) return;
  const song = bgmState.playlist[bgmState.idx % bgmState.playlist.length];
  bgmState.audio.src = song.url;
  $('bgmTitle').textContent = song.name;
}

function bgmToggle() {
  if (bgmState.playing) {
    bgmState.audio.pause();
    bgmState.playing = false;
  } else {
    bgmState.audio.play().catch(() => {});
    bgmState.audio.volume = bgmState.volume;
    bgmState.playing = true;
  }
  updateBGMBtn();
}

function updateBGMBtn() {
  $('bgmPlayBtn').innerHTML = `<i class="fas fa-${bgmState.playing?'pause':'play'} text-white text-xs"></i>`;
}

function bgmNext() {
  bgmState.idx = (bgmState.idx + 1) % bgmState.playlist.length;
  loadBGMTrack();
  bgmState.audio.play().catch(() => {});
  bgmState.playing = true;
  updateBGMBtn();
  renderBGMPlaylist();
}

function bgmPrev() {
  bgmState.idx = (bgmState.idx - 1 + bgmState.playlist.length) % bgmState.playlist.length;
  loadBGMTrack();
  bgmState.audio.play().catch(() => {});
  bgmState.playing = true;
  updateBGMBtn();
  renderBGMPlaylist();
}

function bgmSetVolume(val) {
  bgmState.volume = val / 100;
  bgmState.audio.volume = bgmState.volume;
}

function bgmSeek(e) {
  if (!bgmState.audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  bgmState.audio.currentTime = pct * bgmState.audio.duration;
}

function toggleBgmPlaylist() {
  const pl = $('bgmPlaylist');
  pl.style.display = pl.style.display === 'none' ? 'block' : 'none';
}

function renderBGMPlaylist() {
  const pl = $('bgmPlaylist');
  pl.innerHTML = bgmState.playlist.map((s, i) => `
    <div class="flex items-center gap-2 p-1.5 rounded text-xs cursor-pointer hover:bg-black/5 ${i === bgmState.idx ? 'font-bold' : ''}" onclick="playBGMIdx(${i})" style="${i === bgmState.idx ? 'color:var(--accent)' : 'color:var(--muted)'}">
      <i class="fas fa-${i===bgmState.idx && bgmState.playing ? 'volume-up' : 'music'}"></i>
      <span class="truncate flex-1">${s.name}</span>
    </div>
  `).join('');
}

function playBGMIdx(i) {
  bgmState.idx = i;
  loadBGMTrack();
  bgmState.audio.play().catch(() => {});
  bgmState.playing = true;
  updateBGMBtn();
  renderBGMPlaylist();
}

// 搜索网易云歌曲
async function searchMusic() {
  const keyword = $('musicSearchInput').value.trim();
  if (!keyword) { showToast('请输入搜索关键词'); return; }
  try {
    const resp = await fetch(`https://meting.elysium-stack.cn/api?server=netease&type=search&id=${encodeURIComponent(keyword)}`);
    const data = await resp.json();
    const results = $('musicSearchResults');
    results.innerHTML = '';
    (data || []).slice(0, 10).forEach(s => {
      results.innerHTML += `<div class="flex items-center gap-2 p-2 rounded-lg cursor-pointer hover:bg-black/5" style="background:var(--surface)" onclick="addNeteaseSong('${s.name||''}','${s.url||''}')">
        <i class="fas fa-music" style="color:var(--accent)"></i>
        <div class="flex-1 min-w-0"><div class="text-sm font-bold truncate">${s.name || s.title || '未知'}</div><div class="text-xs truncate" style="color:var(--muted)">${s.artist || ''}</div></div>
        <button class="text-xs" style="color:var(--accent)"><i class="fas fa-plus"></i></button>
      </div>`;
    });
    if (!data || !data.length) results.innerHTML = '<p class="text-center py-4" style="color:var(--muted)">无搜索结果</p>';
  } catch(e) {
    showToast('搜索失败，请稍后重试');
  }
}

function addNeteaseSong(name, url) {
  if (!url) { showToast('无法获取歌曲链接'); return; }
  bgmState.playlist.push({ name: name || '网易云歌曲', url });
  renderBGMPlaylist();
  showToast('已添加到播放列表');
  closeModal('musicSearchModal');
}

// ==================== 每日榜首统计 ====================
async function calculateTopPost() {
  const yesterday = new Date(Date.now() - 86400000).toISOString();
  // 清除旧置顶
  await sb.from('posts').update({ is_top_today: false }).eq('is_top_today', true);
  // 计算最热帖子
  const { data } = await sb.from('posts').select('id, hot_score, upvotes, comments_count').gte('created_at', yesterday).neq('post_type', 'story');
  if (!data || !data.length) return;
  // 计算 hot_score = upvotes*3 + comments*2 + downloads
  let topPost = null, topScore = -1;
  for (const p of data) {
    const score = (p.upvotes||0)*3 + (p.comments_count||0)*2 + (p.downloads||0);
    if (score > topScore) { topScore = score; topPost = p; }
  }
  if (topPost) {
    await sb.from('posts').update({ is_top_today: true, hot_score: topScore }).eq('id', topPost.id);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  initBGM();
  initAuth();
  // 管理员弹窗特殊处理
  const adminBtn = qs('#adminEntry button');

    if (APP.isAdmin) {
      $('adminLogin').style.display = 'none';
      $('adminPanel').style.display = 'block';
      loadAdminData();
    }
    openModal('adminModal');
  };

  // 编辑资料按钮
  const editProfileBtn = qs('#profileTab .btn-warm');
  if (editProfileBtn) editProfileBtn.onclick = () => openEditProfile();

  // 定时计算榜首（每小时检查）
  calculateTopPost();
  setInterval(calculateTopPost, 3600000);
});
